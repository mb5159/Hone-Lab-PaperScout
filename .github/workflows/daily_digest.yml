name: Daily Paper Digest

on:
  schedule:
    # 9:00 AM UTC = 5:00 AM ET (adjust if you want a different delivery time)
    - cron: '0 9 * * *'
  workflow_dispatch:   # lets you click "Run workflow" manually in GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit seen_ids.json back to repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # No pip installs needed — paper_scout.py uses stdlib only (urllib, json, etc.)

      - name: Run PaperScout
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:       ${{ secrets.FROM_EMAIL }}
          APPS_SCRIPT_URL:  ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_KEY:  ${{ secrets.APPS_SCRIPT_KEY }}
          PAGES_URL:        ${{ secrets.PAGES_URL }}
        run: python paper_scout.py

      - name: Save seen IDs back to repo
        run: |
          git config user.name  "PaperScout Bot"
          git config user.email "paperscout-bot@users.noreply.github.com"
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "chore: update seen_ids [skip ci]"
          git push
